services:
  postgres:
    image: postgres:16-alpine
    container_name: carsharing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: elinaleonova/carsharing-backend:latest
    container_name: carsharing_backend
    restart: unless-stopped
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: elinaleonova/carsharing-frontend:latest
    container_name: carsharing_frontend
    restart: unless-stopped
    environment:
      APP_API_BASE_URL: /api
      APP_YANDEX_MAPS_API_KEY: ${APP_YANDEX_MAPS_API_KEY}
      APP_YANDEX_MAPS_LANG: ${APP_YANDEX_MAPS_LANG}
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: elinaleonova/carsharing-nginx:latest
    container_name: carsharing_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
