services:
  postgres:
    image: postgres:16-alpine
    container_name: carsharing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-carsharing_db}
      POSTGRES_USER: ${POSTGRES_USER:-carsharing_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-carsharing_password}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carsharing_user} -d ${POSTGRES_DB:-carsharing_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: carsharing_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${POSTGRES_DB:-carsharing_db}
      DB_USER: ${POSTGRES_USER:-carsharing_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-carsharing_password}
      DB_HOST: postgres
      DB_PORT: 5432
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,nginx,backend"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:${NGINX_PORT:-8080},http://127.0.0.1:${NGINX_PORT:-8080}"
      FRONTEND_URL: "http://localhost:${NGINX_PORT:-8080}/"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: carsharing_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      APP_API_BASE_URL: /api
      APP_YANDEX_MAPS_API_KEY: ${APP_YANDEX_MAPS_API_KEY:-}
      APP_YANDEX_MAPS_LANG: ru_RU
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: carsharing_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/nginx.test.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started

volumes:
  postgres_data:
